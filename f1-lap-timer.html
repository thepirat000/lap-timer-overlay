<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>F1 Lap Overlay</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, monospace;
}

.hud {
  position: absolute;
  top: 30px;
  left: 30px;

  padding: 18px 22px;
  border-radius: 12px;

  background: rgba(0, 0, 0, 0.65);
  border-left: 5px solid #00ff88;

  color: white;
  width: 260px;
}

.current {
  font-size: 42px;
  font-weight: bold;
  color: #00ff88;
  text-shadow: 0 0 10px rgba(0,255,136,0.5);
}

.label {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 10px;
}

.small {
  font-size: 18px;
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="hud">
  <div class="label">CURRENT LAP</div>
  <div id="current" class="current">0.000</div>

  <div class="label">LAST LAP</div>
  <div id="last" class="small">--</div>

  <div class="label">BEST LAP</div>
  <div id="best" class="small">--</div>
</div>

<script>
let startTime = performance.now();
let running = false;

let lastLap = null;
let bestLap = null;

/* FIXED: no floating point drift */
function format(ms) {
  let seconds = Math.floor(ms / 1000);
  let milliseconds = Math.floor(ms % 1000);

  return `${seconds}.${String(milliseconds).padStart(3,'0')}`;
}

/* main loop */
function update() {
  if (running) {
    let now = performance.now();
    let lapTime = now - startTime;
    document.getElementById("current").innerText = format(lapTime);
  }
  requestAnimationFrame(update);
}

/* START (Space) */
function start() {
  startTime = performance.now();
  running = true;
}

/* LAP (L) */
function lap() {
  if (!running) return;

  let now = performance.now();
  let lapTime = now - startTime;

  lastLap = lapTime;

  if (bestLap === null || lapTime < bestLap) {
    bestLap = lapTime;
  }

  document.getElementById("last").innerText = format(lastLap);
  document.getElementById("best").innerText = format(bestLap);

  startTime = performance.now(); // reset lap
}

/* STOP (S) */
function stop() {
  running = false;
}

/* RESET (R) */
function reset() {
  running = false;
  startTime = performance.now();
  lastLap = null;
  bestLap = null;

  document.getElementById("current").innerText = "0.000";
  document.getElementById("last").innerText = "--";
  document.getElementById("best").innerText = "--";
}

/* HOTKEYS (RESTORED EXACTLY) */
document.addEventListener("keydown", (e) => {
  if (e.keyCode === 32) start(); // Space
  if (e.keyCode === 88) start(); // X
  if (e.keyCode === 76) lap();   // L
  if (e.keyCode === 83) stop();  // S
  if (e.keyCode === 82) reset(); // R
});

update();
</script>

</body>
</html>
