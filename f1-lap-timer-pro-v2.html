<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>F1 Lap Overlay (Pro v2)</title>

  <style>
    :root {
      --bg: rgba(0, 0, 0, 0.68);
      --panel: rgba(255, 255, 255, 0.06);
      --panel2: rgba(0, 0, 0, 0.35);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.62);

      --accent: #ff0033; /* F1-ish red */
      --accent2: #00ff88; /* green */

      --good: #00ff88;
      --bad: #ff3b3b;
      --line: rgba(255, 255, 255, 0.12);

      --w: 180px;
      --radius: 14px;

      --lapsH: 490px; /* constant list height */
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Helvetica Neue", Helvetica, "Noto Sans", "Liberation Sans", sans-serif;
    }

    .hud {
      position: absolute;
      top: 26px;
      left: 26px;
      width: var(--w);
      color: var(--text);
      background: var(--bg);
      border-radius: var(--radius);
      contain: layout paint style;
      user-select: none;
      -webkit-user-select: none;
      transform: translateZ(0);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-radius: var(--radius) var(--radius) 0 0;
      background: linear-gradient(90deg, rgba(255,0,51,0.9), rgba(255,0,51,0.25));
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .brand {
      font-size: 11px;
      letter-spacing: 0.18em;
      font-weight: 800;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
    }

    .status {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.04em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.45);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.25);
    }

    .dot.running {
      background: var(--accent2);
      box-shadow: 0 0 18px rgba(0,255,136,0.45), 0 0 0 2px rgba(0,0,0,0.25);
    }

    .content {
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 10px;
      overflow: hidden;
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 900;
    }

    .value {
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
      line-height: 1.0;
    }

    .current {
      font-size: 40px;
      font-weight: 950;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.96);
      text-shadow: 0 0 18px rgba(0,0,0,0.45);
    }

    /* Current lap complete animation */
    @keyframes currentPulse {
      0% { transform: translateZ(0) scale(1); filter: brightness(1) saturate(1); }
      12% { transform: translateZ(0) scale(1.06); filter: brightness(1.95) saturate(1.25); }
      38% { transform: translateZ(0) scale(1.02); filter: brightness(1.35) saturate(1.10); }
      100% { transform: translateZ(0) scale(1); filter: brightness(1) saturate(1); }
    }

    @keyframes currentSweep {
      0% { transform: translateX(-140%); opacity: 0; }
      10% { opacity: 0.95; }
      55% { opacity: 0.35; }
      100% { transform: translateX(140%); opacity: 0; }
    }

    @keyframes lapNoPulse {
      0% { transform: translateZ(0) scale(1); filter: brightness(1); }
      14% { transform: translateZ(0) scale(1.12); filter: brightness(1.7); }
      45% { transform: translateZ(0) scale(1.04); filter: brightness(1.15); }
      100% { transform: translateZ(0) scale(1); filter: brightness(1); }
    }
    .current.is-complete {
      transform-origin: 20% 65%;
      animation: currentPulse 1850ms cubic-bezier(.2,.9,.2,1) 1;
      text-shadow:
        0 0 18px rgba(0,0,0,0.45),
        0 0 18px rgba(255,0,51,0.55),
        0 0 46px rgba(255,0,51,0.38);
    }

    .current {
      position: relative;
      will-change: transform, filter;
    }

    .current::after {
      content: "";
      pointer-events: none;
      position: absolute;
      inset: -10px -18px;
      background:
        linear-gradient(115deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.22) 35%,
          rgba(255,0,51,0.30) 50%,
          rgba(255,255,255,0.22) 65%,
          rgba(255,255,255,0) 100%);
      transform: translateX(-140%);
      opacity: 0;
      mix-blend-mode: screen;
    }

    .current.is-complete::after {
      animation: currentSweep 1850ms cubic-bezier(.2,.9,.2,1) 1;
    }

    /* When a lap is a new best, use accent2 (green/cyan) for the current-lap hit */
    @keyframes currentSweepBest {
      0% { transform: translateX(-140%); opacity: 0; }
      10% { opacity: 0.95; }
      55% { opacity: 0.35; }
      100% { transform: translateX(140%); opacity: 0; }
    }

    .current.is-complete.best-hit {
      text-shadow:
        0 0 18px rgba(0,0,0,0.45),
        0 0 18px rgba(0,255,136,0.62),
        0 0 46px rgba(0,255,136,0.38);
    }

    .current.best-hit::after {
      background:
        linear-gradient(115deg,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.22) 35%,
          rgba(0,255,136,0.34) 50%,
          rgba(255,255,255,0.22) 65%,
          rgba(255,255,255,0) 100%);
    }

    .current.is-complete.best-hit::after {
      animation: currentSweepBest 1850ms cubic-bezier(.2,.9,.2,1) 1;
    }

    #lapNo {
      transform-origin: 50% 60%;
      will-change: transform, filter;
    }

    #lapNo.is-complete {
      animation: lapNoPulse 1300ms cubic-bezier(.2,.9,.2,1) 1;
      text-shadow: 0 0 12px rgba(255,0,51,0.45), 0 0 22px rgba(255,0,51,0.25);
      color: rgba(255,255,255,0.98);
    }

    #lapNo.is-complete.best-hit {
      text-shadow: 0 0 12px rgba(0,255,136,0.45), 0 0 22px rgba(0,255,136,0.25);
    }


    .bestWrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .best {
      font-size: 30px;
      font-weight: 950;
      color: var(--accent2);
      text-shadow: 0 0 14px rgba(0,255,136,0.35);
    }

    /* Best lap achievement animation */
    @keyframes bestHit {
      0% { transform: translateZ(0) scale(1); filter: brightness(1) saturate(1); }
      12% { transform: translateZ(0) scale(1.08); filter: brightness(1.85) saturate(1.28); }
      40% { transform: translateZ(0) scale(1.03); filter: brightness(1.25) saturate(1.08); }
      100% { transform: translateZ(0) scale(1); filter: brightness(1) saturate(1); }
    }

    @keyframes bestSweep {
      0% { transform: translateX(-140%); opacity: 0; }
      10% { opacity: 0.9; }
      55% { opacity: 0.28; }
      100% { transform: translateX(140%); opacity: 0; }
    }

    .best {
      position: relative;
      will-change: transform, filter;
    }

    .best::after {
      content: "";
      pointer-events: none;
      position: absolute;
      inset: -10px -16px;
      background: linear-gradient(115deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.18) 35%,
        rgba(0,255,136,0.26) 50%,
        rgba(255,255,255,0.18) 65%,
        rgba(255,255,255,0) 100%);
      transform: translateX(-140%);
      opacity: 0;
      mix-blend-mode: screen;
    }

    .best.is-best {
      animation: bestHit 1600ms cubic-bezier(.2,.9,.2,1) 1;
      text-shadow: 0 0 14px rgba(0,255,136,0.35), 0 0 28px rgba(0,255,136,0.28);
    }

    .best.is-best::after {
      animation: bestSweep 1600ms cubic-bezier(.2,.9,.2,1) 1;
    }

    #bestLapNo.is-best {
      animation: bestHit 1200ms cubic-bezier(.2,.9,.2,1) 1;
      text-shadow: 0 0 16px rgba(0,255,136,0.35);
      color: rgba(255,255,255,0.98);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .last {
      font-size: 18px;
      font-weight: 800;
      color: rgba(255,255,255,0.94);
    }

    .delta {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      white-space: nowrap;
    }

    .delta.good { color: var(--good); }
    .delta.bad { color: var(--bad); }

    .list {
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .listHead {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .listTitle {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 900;
      color: rgba(255,255,255,0.78);
    }

    .laps {
      height: var(--lapsH);
      max-height: var(--lapsH);
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 2px 2px 0;
      border-radius: 12px;
      background: radial-gradient(120% 120% at 30% 0%, rgba(255,255,255,0.06), rgba(0,0,0,0.08));
      border: 1px solid rgba(255,255,255,0.09);
    }

    .laps {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .laps::-webkit-scrollbar { width: 0; height: 0; }

    .lap {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 5px 7px;
      border-radius: 10px;
      background: rgba(0,0,0,0.20);
      border: 1px solid rgba(255,255,255,0.07);
      will-change: transform, filter;
    }

    .lapNo {
      font-size: 10px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.62);
    }

    .lapTime {
      font-size: 14px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.92);
    }

    .lapDelta {
      font-size: 10px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.62);
      white-space: nowrap;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .labelRow {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .lapCounter {
      font-size: 13px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.86);
      white-space: nowrap;
    }

    .lapDelta.good { color: var(--good); }
    .lapDelta.bad { color: var(--bad); }

    /* Best lap highlight (list) */
    .lap.best {
      border-color: rgba(0,255,136,0.75);
      box-shadow: 0 0 0 1px rgba(0,255,136,0.45) inset, 0 0 16px rgba(0,255,136,0.18);
      background: linear-gradient(90deg, rgba(0,255,136,0.08), rgba(0,0,0,0.16));
    }

    /* Lap complete animation */
    @keyframes lapFlash {
      0% { box-shadow: 0 0 0 rgba(255,0,51,0.0); }
      15% { box-shadow: 0 0 0 2px rgba(255,0,51,0.22), 0 0 26px rgba(255,0,51,0.25); }
      100% { box-shadow: 0 0 0 rgba(255,0,51,0.0); }
    }

    @keyframes lapPop {
      0% { transform: translateY(-6px) scale(0.99); filter: brightness(1.15); }
      55% { transform: translateY(0) scale(1.01); filter: brightness(1.35); }
      100% { transform: translateY(0) scale(1); filter: brightness(1.0); }
    }


    .laps.flash {
      animation: lapFlash 850ms ease-out 1;
    }

    .lap.is-new {
      animation: lapPop 1050ms cubic-bezier(.2,.9,.2,1) 1;
    }

    /* Reduce paint work on slower GPUs */
    @media (prefers-reduced-motion: reduce) {
      .hud { box-shadow: none; }
      .current, .best { text-shadow: none; }
      .laps.flash, .lap.is-new { animation: none; }
      .current.is-complete, #lapNo.is-complete { animation: none; }
      .best.is-best, #bestLapNo.is-best { animation: none; }
    }
  </style>
</head>

<body>
  <div class="hud" role="presentation" aria-hidden="true">
    <div class="topbar">
      <div class="brand">LAP TIMER</div>
      <div class="status">
        <span id="runDot" class="dot"></span>
        <span id="runText">STOPPED</span>
      </div>
    </div>

    <div class="content">
      <div class="grid">
        <div class="card">
          <div class="labelRow">
            <div class="label">CURRENT LAP</div>
            <div id="lapNo" class="lapCounter">0</div>
          </div>
          <div id="current" class="value current mono">00.000</div>
        </div>

        <div class="card">
          <div class="bestWrap">
            <div>
              <div class="labelRow">
                <div class="label">BEST LAP</div>
                <div id="bestLapNo" class="lapCounter">--</div>
              </div>
              <div id="best" class="value best mono">--</div>
            </div>
          </div>
        </div>

        <div class="card" style="display: none;">
          <div class="row">
            <div>
              <div class="label">LAST LAP</div>
              <div id="last" class="value last mono">--</div>
            </div>
            <div id="lastDelta" class="delta mono">--</div>
          </div>
        </div>
      </div>

      <div class="list">
        <div class="listHead">
          <div class="listTitle">LAPS</div>
        </div>
        <div id="laps" class="laps"></div>
      </div>
    </div>
  </div>

  <script>
    const MAX_LAPS = 22;

    const elCurrent = document.getElementById('current');
    const elLast = document.getElementById('last');
    const elBest = document.getElementById('best');
    const elLastDelta = document.getElementById('lastDelta');
    const elLaps = document.getElementById('laps');
    const elRunDot = document.getElementById('runDot');
    const elRunText = document.getElementById('runText');
    const elLapNo = document.getElementById('lapNo');
    const elBestLapNo = document.getElementById('bestLapNo');

    let running = false;
    let startTime = performance.now();

    /** @type {number | null} */
    let lastLapMs = null;
    /** @type {number | null} */
    let bestLapMs = null;

    let bestLapIndex = 0;

    /** @type {{n:number, ms:number, deltaMs:number|null}[]} */
    let laps = [];

    let completedLapCount = 0;

    let lastRenderedCurrent = '';
    let lastRenderedMs = -1;

    let lapFlashTimer = 0;

    let currentAnimTimer = 0;

    let bestAnimTimer = 0;

    /** @type {HTMLDivElement[]} */
    const lapNodes = [];
    /** @type {HTMLDivElement[]} */
    const lapNoNodes = [];
    /** @type {HTMLDivElement[]} */
    const lapTimeNodes = [];
    /** @type {HTMLDivElement[]} */
    const lapDeltaNodes = [];


    function pad2(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    function pad3(n) {
      if (n < 10) return '00' + n;
      if (n < 100) return '0' + n;
      return '' + n;
    }

    function formatLap(ms) {
      const total = Math.max(0, ms | 0);
      const seconds = (total / 1000) | 0;
      const milli = (total % 1000) | 0;
      return pad2(seconds) + '.' + pad3(milli);
    }

    function formatDelta(deltaMs) {
      if (deltaMs === null) return { text: '--', cls: '' };
      const abs = Math.abs(deltaMs);
      const seconds = (abs / 1000) | 0;
      const milli = (abs % 1000) | 0;
      const val = seconds + '.' + pad3(milli);
      if (deltaMs < 0) return { text: '▲' + val, cls: 'good' };
      if (deltaMs > 0) return { text: '▼' + val, cls: 'bad' };
      return { text: '—' + val, cls: '' };
    }

    function setText(el, value) {
      if (el.textContent !== value) el.textContent = value;
    }

    function setDelta(el, delta) {
      const d = formatDelta(delta);
      if (el.textContent !== d.text) el.textContent = d.text;
      el.classList.toggle('good', d.cls === 'good');
      el.classList.toggle('bad', d.cls === 'bad');
    }

    function renderRunState() {
      elRunDot.classList.toggle('running', running);
      setText(elRunText, running ? 'RUNNING' : 'STOPPED');
    }

    function ensureLapPool() {
      if (lapNodes.length) return;

      const frag = document.createDocumentFragment();
      for (let i = 0; i < MAX_LAPS; i++) {
        const lapEl = document.createElement('div');
        lapEl.className = 'lap';

        const noEl = document.createElement('div');
        noEl.className = 'lapNo';

        const timeEl = document.createElement('div');
        timeEl.className = 'lapTime mono';

        const deltaEl = document.createElement('div');
        deltaEl.className = 'lapDelta';

        lapEl.appendChild(noEl);
        lapEl.appendChild(timeEl);
        lapEl.appendChild(deltaEl);

        lapNodes.push(lapEl);
        lapNoNodes.push(noEl);
        lapTimeNodes.push(timeEl);
        lapDeltaNodes.push(deltaEl);

        frag.appendChild(lapEl);
      }

      elLaps.appendChild(frag);
    }

    function renderLapList(newLapNo) {
      ensureLapPool();

      const total = laps.length;
      const visibleCount = Math.min(MAX_LAPS, total);
      const startIndex = total > MAX_LAPS ? (total - MAX_LAPS) : 0;

      for (let i = 0; i < MAX_LAPS; i++) {
        const rowEl = lapNodes[i];

        if (i >= visibleCount) {
          rowEl.style.display = 'none';
          rowEl.classList.remove('best', 'is-new');
          continue;
        }

        const item = laps[startIndex + i];
        const d = formatDelta(item.deltaMs);
        const isBest = bestLapIndex === item.n;
        const isNew = newLapNo === item.n;

        rowEl.style.display = '';
        rowEl.classList.toggle('best', isBest);

        setText(lapNoNodes[i], String(item.n));
        setText(lapTimeNodes[i], formatLap(item.ms));

        setText(lapDeltaNodes[i], d.text);
        lapDeltaNodes[i].classList.toggle('good', d.cls === 'good');
        lapDeltaNodes[i].classList.toggle('bad', d.cls === 'bad');

        if (isNew) {
          rowEl.classList.remove('is-new');
          void rowEl.offsetWidth;
          rowEl.classList.add('is-new');
        } else {
          rowEl.classList.remove('is-new');
        }
      }

      elLaps.scrollTop = elLaps.scrollHeight;
    }

    function renderLapCounter() {
      const currentLapNo = running ? (completedLapCount + 1) : completedLapCount;
      setText(elLapNo, currentLapNo);
    }

    function flashOnLapComplete() {
      elLaps.classList.remove('flash');
      void elLaps.offsetWidth;
      elLaps.classList.add('flash');

      if (lapFlashTimer) window.clearTimeout(lapFlashTimer);
      lapFlashTimer = window.setTimeout(() => elLaps.classList.remove('flash'), 1000);
    }

    function animateCurrentLapComplete(isBest) {
      elCurrent.classList.remove('is-complete');
      elLapNo.classList.remove('is-complete');
      elCurrent.classList.remove('best-hit');
      elLapNo.classList.remove('best-hit');
      void elCurrent.offsetWidth;
      elCurrent.classList.add('is-complete');
      elLapNo.classList.add('is-complete');
      if (isBest) {
        elCurrent.classList.add('best-hit');
        elLapNo.classList.add('best-hit');
      }

      if (currentAnimTimer) window.clearTimeout(currentAnimTimer);
      currentAnimTimer = window.setTimeout(() => {
        elCurrent.classList.remove('is-complete');
        elLapNo.classList.remove('is-complete');
        elCurrent.classList.remove('best-hit');
        elLapNo.classList.remove('best-hit');
      }, 2100);
    }

    function animateBestLap() {
      elBest.classList.remove('is-best');
      elBestLapNo.classList.remove('is-best');
      void elBest.offsetWidth;
      elBest.classList.add('is-best');
      elBestLapNo.classList.add('is-best');

      if (bestAnimTimer) window.clearTimeout(bestAnimTimer);
      bestAnimTimer = window.setTimeout(() => {
        elBest.classList.remove('is-best');
        elBestLapNo.classList.remove('is-best');
      }, 1800);
    }

    function start() {
      startTime = performance.now();
      running = true;
      renderRunState();
      renderLapCounter();
    }

    function stop() {
      running = false;
      renderRunState();
      renderLapCounter();
    }

    function reset() {
      ensureLapPool();
      running = false;
      startTime = performance.now();
      lastLapMs = null;
      bestLapMs = null;
      bestLapIndex = 0;
      laps = [];
      completedLapCount = 0;
      elLaps.scrollTop = 0;

      if (currentAnimTimer) window.clearTimeout(currentAnimTimer);
      currentAnimTimer = 0;
      elCurrent.classList.remove('is-complete');
      elLapNo.classList.remove('is-complete');
      elCurrent.classList.remove('best-hit');
      elLapNo.classList.remove('best-hit');

      if (bestAnimTimer) window.clearTimeout(bestAnimTimer);
      bestAnimTimer = 0;
      elBest.classList.remove('is-best');
      elBestLapNo.classList.remove('is-best');

      lastRenderedCurrent = '';
      lastRenderedMs = -1;
      setText(elCurrent, '00.000');
      setText(elLast, '--');
      setText(elBest, '--');
      setText(elBestLapNo, '--');
      setText(elLastDelta, '--');
      elLastDelta.classList.remove('good', 'bad');
      renderLapList();
      renderRunState();
      renderLapCounter();
    }

    function lap() {
      if (!running) return;

      const now = performance.now();
      const lapMs = now - startTime;

      const prevLap = lastLapMs;
      lastLapMs = lapMs;

      const deltaMs = prevLap === null ? null : lapMs - prevLap;

      const n = laps.length + 1;

      const newBest = bestLapMs === null || lapMs < bestLapMs;
      if (newBest) {
        bestLapMs = lapMs;
        bestLapIndex = n;
      }

      setText(elLast, formatLap(lapMs));
      setDelta(elLastDelta, deltaMs);

      setText(elBest, bestLapMs === null ? '--' : formatLap(bestLapMs));
      setText(elBestLapNo, bestLapIndex ? String(bestLapIndex) : '--');

      if (newBest) animateBestLap();

      laps.push({ n, ms: lapMs, deltaMs });
      completedLapCount = laps.length;

      renderLapList(n);
      renderLapCounter();
      flashOnLapComplete();
      animateCurrentLapComplete(newBest);

      startTime = performance.now();
      lastRenderedCurrent = '';
      lastRenderedMs = -1;
    }

    function tick() {
      if (running) {
        const now = performance.now();
        const elapsed = now - startTime;
        const msInt = elapsed | 0;
        if (msInt !== lastRenderedMs) {
          lastRenderedMs = msInt;
          const text = formatLap(msInt);
          if (text !== lastRenderedCurrent) {
            lastRenderedCurrent = text;
            elCurrent.textContent = text;
          }
        }
      }

      requestAnimationFrame(tick);
    }

    document.addEventListener('keydown', (e) => {
      if (e.repeat) return;

      const code = e.keyCode;
      if (code === 32) start(); // Space
      if (code === 88) start(); // X
      if (code === 76) lap();   // L
      if (code === 83) stop();  // S
      if (code === 82) reset(); // R
    });

    reset();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
